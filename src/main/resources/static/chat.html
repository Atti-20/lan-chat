<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>LanChat — 聊天</title>
  <link rel="stylesheet" href="/css/design.css">
  <link rel="stylesheet" href="/css/chat.css">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
</head>
<body>
  <div class="chat-app" id="chatApp">
    <!-- ============ Navigation Rail ============ -->
    <nav class="nav-rail">
      <div class="nav-rail-logo">
        <svg viewBox="0 0 40 40" fill="none">
          <rect width="40" height="40" rx="12" fill="#007AFF"/>
          <path d="M12 14C12 12.8954 12.8954 12 14 12H26C27.1046 12 28 12.8954 28 14V22C28 23.1046 27.1046 24 26 24H20L14 29V24H14C12.8954 24 12 23.1046 12 22V14Z" fill="white"/>
        </svg>
      </div>
      <div class="nav-rail-items">
        <div class="nav-rail-item active" data-view="chats" onclick="App.switchView('chats')" title="消息">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
          <span class="nav-rail-badge hidden" id="chatBadge">0</span>
        </div>
        <div class="nav-rail-item" data-view="contacts" onclick="App.switchView('contacts')" title="好友">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </div>
        <div class="nav-rail-item" data-view="groups" onclick="App.switchView('groups')" title="群组">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 7V5a2 2 0 0 1 2-2h2"/>
            <path d="M17 3h2a2 2 0 0 1 2 2v2"/>
            <path d="M21 17v2a2 2 0 0 1-2 2h-2"/>
            <path d="M7 21H5a2 2 0 0 1-2-2v-2"/>
            <rect x="7" y="7" width="10" height="10" rx="1"/>
          </svg>
        </div>
        <div class="nav-rail-item" data-view="requests" onclick="App.switchView('requests')" title="好友申请">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="8.5" cy="7" r="4"/>
            <line x1="20" y1="8" x2="20" y2="14"/>
            <line x1="23" y1="11" x2="17" y2="11"/>
          </svg>
          <span class="nav-rail-badge hidden" id="requestBadge">0</span>
        </div>
      </div>
      <div class="nav-rail-item nav-rail-avatar" onclick="App.showProfile()" title="我的">
        <div id="navAvatar"></div>
      </div>
    </nav>

    <!-- ============ Sidebar ============ -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title" id="sidebarTitle">消息</div>
        <div class="sidebar-user-actions">
          <div class="btn-icon" id="sidebarUserAvatar" onclick="App.showProfile()" title="个人资料"></div>
          <div class="btn-icon" onclick="App.showSearchModal()" title="搜索用户">
            <svg width="1rem" height="1rem" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
          </div>
          <div class="btn-icon" onclick="App.showCreateGroupModal()" title="创建群组" id="createGroupBtn">
            <svg width="1rem" height="1rem" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
          </div>
          <div class="btn-icon" onclick="App.quickLogout()" title="退出登录">
            <svg width="1rem" height="1rem" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
          </div>
        </div>
      </div>
      <div class="sidebar-search">
        <div class="search-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" id="sidebarSearch" placeholder="搜索" oninput="App.handleSidebarSearch(this.value)">
        </div>
      </div>

      <div class="sidebar-list" id="sidebarList">
        <!-- 动态填充 -->
      </div>
      <!-- 管理控制台按钮已移至"我的"面板操作列表中 -->
    </aside>

    <!-- ============ Chat Panel ============ -->
    <main class="chat-panel" id="chatPanel">
      <div class="chat-empty" id="chatEmpty">
        <div class="chat-empty-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
        </div>
        <div class="chat-empty-text">选择一个对话开始聊天</div>
        <div class="chat-empty-hint">在左侧选择好友或群组</div>
      </div>

      <div class="chat-active hidden" id="chatActive" style="display:none;flex-direction:column;height:100%;overflow:hidden;">
        <!-- Chat Header -->
        <div class="chat-header">
          <div class="btn-icon mobile-back" onclick="App.mobileBack()" style="display:none;">
            <svg width="1rem" height="1rem" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
            </svg>
          </div>
          <div id="chatHeaderAvatar"></div>
          <div class="chat-header-info">
            <div class="chat-header-name" id="chatHeaderName"></div>
            <div class="chat-header-status" id="chatHeaderStatus"></div>
          </div>
          <div class="chat-header-actions">
            <div class="btn-icon" onclick="App.toggleInfoPanel()" title="详情">
              <svg width="1rem" height="1rem" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/>
              </svg>
            </div>
          </div>
        </div>

        <!-- Message Area -->
        <div class="message-area" id="messageArea">
          <!-- 消息动态填充 -->
        </div>

        <!-- Typing Indicator -->
        <div class="typing-indicator hidden" id="typingIndicator">
          <div class="typing-dots">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
          </div>
          <span class="text-slate" style="font-size:var(--fs-sm);" id="typingText">对方正在输入...</span>
        </div>

        <!-- Input Area -->
        <div class="chat-input-area">
          <!-- Reply Preview -->
          <div class="chat-input-reply hidden" id="replyPreview">
            <svg width="1rem" height="1rem" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--color-accent);flex-shrink:0;">
              <polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/>
            </svg>
            <div class="chat-input-reply-text" id="replyPreviewText"></div>
            <div class="btn-icon" onclick="App.cancelReply()" style="width:1.25rem;height:1.25rem;">
              <svg width="0.875rem" height="0.875rem" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
            </div>
          </div>

          <!-- Toolbar -->
          <div class="chat-input-toolbar">
            <div class="btn-icon" onclick="document.getElementById('fileInput').click()" title="发送文件">
              <svg width="1rem" height="1rem" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
              </svg>
            </div>
            <div class="btn-icon" onclick="document.getElementById('imageInput').click()" title="发送图片">
              <svg width="1rem" height="1rem" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
              </svg>
            </div>
            <div class="toolbar-divider"></div>
            <div class="burn-toggle" id="burnToggle" onclick="App.toggleBurn()" title="阅后即焚">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 3q1 4 4 6.5t3 5.5a1 1 0 0 1-14 0 5 5 0 0 1 1-3 1 1 0 0 0 5 0c0-2-1.5-3-1.5-5q0-2 2.5-4"/>
              </svg>
              <span>阅后即焚</span>
            </div>
          </div>

          <!-- Input Box -->
          <div class="chat-input-box">
            <textarea id="messageInput" rows="1" placeholder="输入消息..." oninput="App.handleInput(this)" onkeydown="App.handleKeyDown(event)"></textarea>
            <div class="chat-send-btn" id="sendBtn" onclick="App.sendMessage()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
              </svg>
            </div>
          </div>
        </div>

        <!-- Hidden file inputs -->
        <input type="file" id="fileInput" class="hidden" onchange="App.handleFileUpload(this, 'file')">
        <input type="file" id="imageInput" class="hidden" accept="image/*" onchange="App.handleFileUpload(this, 'image')">
      </div>
    </main>
  </div>

  <!-- ============ Mobile Bottom Nav ============ -->
  <nav class="mobile-nav">
    <div class="mobile-nav-item active" onclick="App.switchView('chats')">
      <svg width="1.25rem" height="1.25rem" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <span>消息</span>
    </div>
    <div class="mobile-nav-item" onclick="App.switchView('contacts')">
      <svg width="1.25rem" height="1.25rem" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
      </svg>
      <span>好友</span>
    </div>
    <div class="mobile-nav-item" onclick="App.switchView('groups')">
      <svg width="1.25rem" height="1.25rem" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
      </svg>
      <span>群组</span>
    </div>
    <div class="mobile-nav-item" onclick="App.switchView('requests')">
      <svg width="1.25rem" height="1.25rem" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/>
        <line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/>
      </svg>
      <span>申请</span>
    </div>
    <div class="mobile-nav-item" onclick="App.showProfile()">
      <svg width="1.25rem" height="1.25rem" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
      </svg>
      <span>我的</span>
    </div>
  </nav>

  <!-- ============ Info Panel ============ -->
  <div class="info-panel" id="infoPanel">
    <div class="info-panel-header">
      <div class="modal-title" id="infoPanelTitle">详情</div>
      <div class="btn-icon" onclick="App.toggleInfoPanel()">
        <svg width="1rem" height="1rem" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </div>
    </div>
    <div class="info-panel-body" id="infoPanelBody">
      <!-- 动态填充 -->
    </div>
  </div>

  <div id="adminConsoleModal" class="admin-console-overlay" style="display:none;">
    <div class="admin-console-wrap">
      <div class="admin-console-card">
        <div class="admin-console-header">
          <h5 class="admin-console-title">管理控制台</h5>
          <button class="admin-console-close" onclick="document.getElementById('adminConsoleModal').style.display='none'">&times;</button>
        </div>
        <div class="admin-console-body">
          <div class="admin-stats-row">
            <div class="admin-stat-card">
              <div>
                <div class="admin-stat-label">全站注册总人数</div>
                <div id="admin-total-users" class="admin-stat-value">0 人</div>
              </div>
            </div>
            <div class="admin-stat-card">
              <div>
                <div class="admin-stat-note">全局系统控制提示</div>
                <div class="admin-stat-desc">封禁操作将即时写入数据库，被封禁用户重新登录时将被强行拦截。</div>
              </div>
              <button class="admin-refresh-btn" onclick="AdminModule.loadUserList()">刷新数据</button>
            </div>
          </div>

          <div class="admin-table-wrap">
            <table class="admin-table">
              <thead>
              <tr>
                <th>用户ID</th>
                <th>用户名</th>
                <th>昵称</th>
                <th>当前状态</th>
                <th>免打扰/禁言时段</th>
                <th>操作</th>
              </tr>
              </thead>
              <tbody id="admin-user-table-body">
              <tr><td colspan="6" class="admin-table-loading">正在加载全站用户数据...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ============ Modal Container ============ -->
  <div id="modalContainer"></div>

  <!-- ============ Toast Container ============ -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- ============ Scripts ============ -->
  <script src="/js/utils.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/websocket.js"></script>
  <script src="/js/admin.js"></script>
  <script src="/js/chat.js"></script>
</body>
</html>
