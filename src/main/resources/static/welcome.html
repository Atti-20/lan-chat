<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>LanChat — 欢迎</title>
  <link rel="stylesheet" href="/css/design.css">
  <link rel="stylesheet" href="/css/welcome.css">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
</head>
<body>
  <div class="welcome-page">
    <!-- Progress dots -->
    <div class="welcome-dots">
      <div class="welcome-dot active" data-page="0"></div>
      <div class="welcome-dot" data-page="1"></div>
      <div class="welcome-dot" data-page="2"></div>
      <div class="welcome-dot" data-page="3"></div>
    </div>

    <!-- Page container -->
    <div class="welcome-slider-wrap">
    <div class="welcome-slider" id="welcomeSlider">

      <!-- Page 1: 欢迎 -->
      <div class="welcome-slide" data-page="0">
        <div class="slide-content">
          <div class="slide-icon slide-icon-hero">
            <svg viewBox="0 0 80 80" fill="none">
              <rect width="80" height="80" rx="20" fill="#007AFF"/>
              <path d="M24 28C24 25.8 25.8 24 28 24H52C54.2 24 56 25.8 56 28V44C56 46.2 54.2 48 52 48H40L28 58V48C25.8 48 24 46.2 24 44V28Z" fill="white"/>
            </svg>
          </div>
          <h1 class="slide-title">欢迎来到 LanChat</h1>
          <p class="slide-desc">一个轻量、私密的即时通讯平台<br>在这里，对话不止于文字</p>
        </div>
      </div>

      <!-- Page 2: 即时通讯 -->
      <div class="welcome-slide" data-page="1">
        <div class="slide-content">
          <div class="slide-icon">
            <svg viewBox="0 0 64 64" fill="none">
              <circle cx="32" cy="32" r="28" fill="rgba(0,122,255,0.1)" stroke="#007AFF" stroke-width="2"/>
              <path d="M20 24h24M20 32h16M20 40h20" stroke="#007AFF" stroke-width="2.5" stroke-linecap="round"/>
              <circle cx="48" cy="40" r="4" fill="#34C759"/>
            </svg>
          </div>
          <h2 class="slide-title">实时消息</h2>
          <p class="slide-desc">基于 WebSocket 的即时消息推送<br>支持私聊、群聊，消息实时送达</p>
          <div class="slide-features">
            <div class="slide-feature">
              <div class="slide-feature-icon">💬</div>
              <span>私聊 & 群聊</span>
            </div>
            <div class="slide-feature">
              <div class="slide-feature-icon">🔔</div>
              <span>实时推送通知</span>
            </div>
            <div class="slide-feature">
              <div class="slide-feature-icon">📱</div>
              <span>多端同步在线</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Page 3: 安全与隐私 -->
      <div class="welcome-slide" data-page="2">
        <div class="slide-content">
          <div class="slide-icon">
            <svg viewBox="0 0 64 64" fill="none">
              <path d="M32 6L8 18v16c0 14.4 10.24 27.84 24 32 13.76-4.16 24-17.6 24-32V18L32 6z" fill="rgba(52,199,89,0.1)" stroke="#34C759" stroke-width="2"/>
              <path d="M24 32l6 6 12-12" stroke="#34C759" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <h2 class="slide-title">安全与隐私</h2>
          <p class="slide-desc">你的每一条消息都受到保护<br>阅后即焚让隐私更有保障</p>
          <div class="slide-features">
            <div class="slide-feature">
              <div class="slide-feature-icon">🔥</div>
              <span>阅后即焚</span>
            </div>
            <div class="slide-feature">
              <div class="slide-feature-icon">📎</div>
              <span>文件秒传 & 签名预览</span>
            </div>
            <div class="slide-feature">
              <div class="slide-feature-icon">🔒</div>
              <span>消息撤回</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Page 4: 设置头像 & 开始 -->
      <div class="welcome-slide" data-page="3">
        <div class="slide-content">
          <h2 class="slide-title">设置你的头像</h2>
          <p class="slide-desc">选一个喜欢的头像，让好友更容易找到你</p>

          <!-- 当前头像预览 -->
          <div class="avatar-preview-wrap" id="avatarPreviewWrap">
            <div class="avatar-preview" id="welcomeAvatarPreview"></div>
          </div>

          <!-- 默认头像网格 -->
          <div class="default-avatars" id="defaultAvatars"></div>

          <!-- 自定义上传 -->
          <input type="file" id="welcomeAvatarFile" accept="image/*" style="display:none">
          <button class="btn btn-secondary upload-btn" onclick="document.getElementById('welcomeAvatarFile').click()">
            <svg width="1rem" height="1rem" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            上传自定义头像
          </button>

          <div class="welcome-enter-wrap">
            <div class="welcome-greeting" id="welcomeGreeting"></div>
            <button class="btn btn-primary welcome-enter-btn" onclick="enterApp()">
              开始使用 LanChat
              <svg width="1.125rem" height="1.125rem" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
            </button>
          </div>
        </div>
      </div>

    </div>
    </div>

    <!-- Navigation buttons -->
    <div class="welcome-nav">
      <button class="btn btn-ghost welcome-skip" id="skipBtn" onclick="skipToLast()">跳过</button>
      <button class="btn btn-primary welcome-next" id="nextBtn" onclick="nextPage()">
        继续
        <svg width="1rem" height="1rem" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="/js/utils.js"></script>
  <script src="/js/api.js"></script>

    function init() {
      const token = Utils.storage.get('token');
      if (!token) {
        window.location.href = '/';
        return;
      }

      const userInfo = Utils.storage.get('userInfo');
      if (!userInfo) {
        window.location.href = '/';
        return;
      }

      // 渲染欢迎语
      const greeting = document.getElementById('welcomeGreeting');
      greeting.textContent = `你好，${userInfo.nickname || userInfo.username}！`;

      // 渲染当前头像预览
      renderAvatarPreview(userInfo.nickname || userInfo.username, userInfo.avatar);

      // 渲染默认头像网格
      renderDefaultAvatars(userInfo.nickname || userInfo.username);

      // 绑定文件上传
      document.getElementById('welcomeAvatarFile').addEventListener('change', handleAvatarUpload);

      updateNavigation();
    }

    function renderAvatarPreview(name, avatar) {
      const container = document.getElementById('welcomeAvatarPreview');
      if (avatar && avatar.startsWith('http')) {
        container.innerHTML = `<img src="${avatar}" alt="头像" class="avatar-preview-img">`;
      } else if (avatar && avatar.startsWith('data:')) {
        container.innerHTML = `<img src="${avatar}" alt="头像" class="avatar-preview-img">`;
      } else if (avatar && avatar.startsWith('svg:')) {
        const idx = parseInt(avatar.split(':')[1]) || 0;
        const av = defaultAvatars[idx] || defaultAvatars[0];
        container.innerHTML = `<div class="avatar-preview-svg">${av.svg}</div>`;
      } else if (avatar && avatar.startsWith('emoji:')) {
        const emoji = avatar.split(':')[1];
        const color = avatar.split(':')[2] || '#007AFF';
        container.innerHTML = `<div class="avatar-preview-emoji" style="background:${color}">${emoji}</div>`;
      } else {
        const initial = (name || '?').charAt(0).toUpperCase();
        container.innerHTML = `<div class="avatar-preview-letter">${initial}</div>`;
      }
    }

    function renderDefaultAvatars(name) {
      const grid = document.getElementById('defaultAvatars');
      grid.innerHTML = defaultAvatars.map((av, i) => {
        return `<div class="default-avatar-item" onclick="selectDefaultAvatar(${i})" title="${av.name}">
                  ${av.svg}
                </div>`;
      }).join('');
    }

    function selectDefaultAvatar(index) {
      const av = defaultAvatars[index];
      selectedAvatar = `svg:${index}`;
      customAvatarFile = null;

      // 更新预览
      const container = document.getElementById('welcomeAvatarPreview');
      container.innerHTML = `<div class="avatar-preview-svg">${av.svg}</div>`;

      // 高亮选中项
      document.querySelectorAll('.default-avatar-item').forEach(el => el.classList.remove('selected'));
      event.currentTarget.classList.add('selected');
    }

    function handleAvatarUpload(e) {
      const file = e.target.files[0];
      if (!file) return;
      if (!file.type.startsWith('image/')) {
        Utils.toast('请选择图片文件', 'error');
        return;
      }
      if (file.size > 5 * 1024 * 1024) {
        Utils.toast('图片不能超过 5MB', 'error');
        return;
      }

      customAvatarFile = file;
      selectedAvatar = '';

      const reader = new FileReader();
      reader.onload = (ev) => {
        const container = document.getElementById('welcomeAvatarPreview');
        container.innerHTML = `<img src="${ev.target.result}" alt="头像" class="avatar-preview-img">`;

        // 清除默认选中
        document.querySelectorAll('.default-avatar-item').forEach(el => el.classList.remove('selected'));
      };
      reader.readAsDataURL(file);
    }

    // ==================== 页面导航 ====================

    function goToPage(page) {
      if (page < 0 || page >= totalPages) return;
      currentPage = page;

      const slider = document.getElementById('welcomeSlider');
      slider.style.transform = `translateX(-${page * 100}%)`;

      // 更新圆点
      document.querySelectorAll('.welcome-dot').forEach((dot, i) => {
        dot.classList.toggle('active', i === page);
      });

      updateNavigation();
    }

    function nextPage() {
      if (currentPage < totalPages - 1) {
        goToPage(currentPage + 1);
      }
    }

    function skipToLast() {
      goToPage(totalPages - 1);
    }

    function updateNavigation() {
      const skipBtn = document.getElementById('skipBtn');
      const nextBtn = document.getElementById('nextBtn');

      if (currentPage === totalPages - 1) {
        // 最后一页：隐藏导航按钮
        skipBtn.style.display = 'none';
        nextBtn.style.display = 'none';
      } else {
        skipBtn.style.display = '';
        nextBtn.style.display = '';
      }
    }

    // ==================== 进入应用 ====================

    async function enterApp() {
      const btn = document.querySelector('.welcome-enter-btn');
      btn.disabled = true;
      btn.innerHTML = '正在准备...'

      try {
        // 如果选择了自定义头像，先上传
        if (customAvatarFile) {
          const formData = new FormData();
          formData.append('file', customAvatarFile);
          const uploadResult = await API.file.upload(formData);
          if (uploadResult) {
            const avatarUrl = uploadResult.url || uploadResult.fileUrl || uploadResult;
            if (typeof avatarUrl === 'string') {
              await API.user.updateProfile({ avatar: avatarUrl });
            }
          }
        } else if (selectedAvatar) {
          // 保存 emoji 头像标识
          await API.user.updateProfile({ avatar: selectedAvatar });
        }

        // 刷新用户信息
        const freshInfo = await API.user.getInfo();
        if (freshInfo) {
          Utils.storage.set('userInfo', {
            userId: freshInfo.id,
            username: freshInfo.username,
            nickname: freshInfo.nickname,
            avatar: freshInfo.avatar
          });
        }
      } catch (e) {
        // 即使头像保存失败也继续进入
      }

      window.location.href = '/chat';
    }

    // ==================== 初始化 ====================
    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
