server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/lan_chat?serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=utf8&connectionCollation=utf8mb4_general_ci}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Redis 缓存
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      timeout: 5000ms

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

# MyBatis Plus
mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
    map-underscore-to-camel-case: true

# JWT 配置
jwt:
  secret: ${JWT_SECRET:lan-chat-local-development-secret-change-in-production-2026}
  issuer: ${JWT_ISSUER:lanchat-node}
  audience: ${JWT_AUDIENCE:lanchat-client}
  expiration: 7200000          # Token 有效期 2 小时（毫秒）
  refresh-expiration: 604800000 # 刷新令牌有效期 7 天（毫秒）

auth:
  refresh-cookie:
    secure: ${AUTH_COOKIE_SECURE:false}

# 文件存储
file:
  path: ${FILE_STORAGE_PATH:./uploads/}
  allowed-types: jpg,jpeg,png,gif,bmp,webp,doc,docx,xls,xlsx,ppt,pptx,pdf,txt,csv,json,md,zip,rar,7z,tar,gz,mp4,mp3,wav,avi,mov
  max-size: 104857600          # 100MB


# ==================== Devtools (热加载) ====================
spring.devtools:
  restart:
    enabled: true
    additional-paths: src/main/java
    poll-interval: 2s
    quiet-period: 1s
  livereload:
    enabled: true
    port: 35729

logging:
  level:
    com.lanchat: info

# WebSocket 浏览器来源。公网经过 HTTPS Tunnel 转发到本机 HTTP 时，
# 必须显式允许公网 Origin，否则 Spring 默认同源校验会拒绝握手。
websocket:
  allowed-origins: ${WEBSOCKET_ALLOWED_ORIGINS:http://localhost:8080,http://127.0.0.1:8080}

# ==================== Cloudflare Tunnel ====================
tunnel:
  enabled: ${TUNNEL_ENABLED:false}
  hostname: ${TUNNEL_HOSTNAME:}
