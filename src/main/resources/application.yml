server:
  port: 8080

lanchat:
  node:
    id: ${LANCHAT_NODE_ID:}
    name: ${LANCHAT_NODE_NAME:LanChat Node}
    organization-name: ${LANCHAT_ORGANIZATION_NAME:Local Organization}
    mode: ${LANCHAT_MODE:LAN_FIRST}
    version: 3.0.0
    advertised-host: ${LANCHAT_ADVERTISED_HOST:}
    advertised-port: ${LANCHAT_ADVERTISED_PORT:${server.port}}
    secure: ${LANCHAT_NODE_SECURE:false}
  discovery:
    enabled: ${LANCHAT_DISCOVERY_ENABLED:false}
    interface-address: ${LANCHAT_DISCOVERY_INTERFACE_ADDRESS:}
  cluster:
    enabled: ${LANCHAT_CLUSTER_ENABLED:false}
    id: ${LANCHAT_CLUSTER_ID:}
    instance-id: ${LANCHAT_INSTANCE_ID:}
    channel: "${LANCHAT_CLUSTER_CHANNEL:lanchat:{clusterId}:realtime:v1}"
    presence-ttl-seconds: ${LANCHAT_PRESENCE_TTL_SECONDS:90}
    presence-heartbeat-seconds: ${LANCHAT_PRESENCE_HEARTBEAT_SECONDS:25}
  private-deployment:
    enabled: ${LANCHAT_PRIVATE_DEPLOYMENT:false}
    self-registration-enabled: ${LANCHAT_SELF_REGISTRATION_ENABLED:true}
    bootstrap-admin-password: ${LANCHAT_BOOTSTRAP_ADMIN_PASSWORD:}
    bootstrap-admin-nickname: ${LANCHAT_BOOTSTRAP_ADMIN_NICKNAME:系统管理员}
  runtime-logs:
    max-read-bytes: ${LANCHAT_RUNTIME_LOG_MAX_READ_BYTES:4194304}

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/lan_chat?serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=utf8&connectionCollation=utf8mb4_general_ci}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Redis 缓存
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      password: ${REDIS_PASSWORD:}
      timeout: 5000ms

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

# MyBatis Plus
mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
    map-underscore-to-camel-case: true

# JWT 配置
jwt:
  secret: ${JWT_SECRET:lan-chat-local-development-secret-change-in-production-2026}
  issuer: ${JWT_ISSUER:lanchat-node}
  audience: ${JWT_AUDIENCE:lanchat-client}
  expiration: 7200000          # Token 有效期 2 小时（毫秒）
  refresh-expiration: 604800000 # 刷新令牌有效期 7 天（毫秒）

auth:
  refresh-cookie:
    secure: ${AUTH_COOKIE_SECURE:false}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://chat.atti.cc.cd,http://localhost:8080,http://127.0.0.1:8080,tauri://localhost,http://tauri.localhost,https://tauri.localhost,http://127.0.0.1:1420,http://localhost:1420,https://localhost}

# 文件存储
file:
  storage-type: ${FILE_STORAGE_TYPE:LOCAL} # LOCAL / MINIO
  path: ${FILE_STORAGE_PATH:./uploads/}
  staging-path: ${FILE_STAGING_PATH:}
  allowed-types: jpg,jpeg,png,gif,bmp,webp,doc,docx,xls,xlsx,ppt,pptx,pdf,txt,csv,json,md,zip,rar,7z,tar,gz,mp4,mp3,wav,avi,mov,apk
  max-size: 104857600          # 100MB
  avatar-max-size: 5242880     # 5MB
  min-free-space: ${FILE_MIN_FREE_SPACE:52428800} # 上传后至少保留 50MB
  max-image-pixels: ${FILE_MAX_IMAGE_PIXELS:40000000}
  upload:
    chunk-size: ${FILE_UPLOAD_CHUNK_SIZE:5242880} # 5MiB, 服务端限制在 256KiB-16MiB
    ttl-hours: ${FILE_UPLOAD_TTL_HOURS:24}
    max-concurrency: ${FILE_UPLOAD_MAX_CONCURRENCY:4} # 每用户同时未完成的上传会话上限
    cleanup-fixed-delay-ms: ${FILE_UPLOAD_CLEANUP_FIXED_DELAY_MS:600000}
    cleanup-initial-delay-ms: ${FILE_UPLOAD_CLEANUP_INITIAL_DELAY_MS:60000}
  cleanup:
    fixed-delay-ms: ${FILE_OBJECT_CLEANUP_FIXED_DELAY_MS:60000}
    initial-delay-ms: ${FILE_OBJECT_CLEANUP_INITIAL_DELAY_MS:60000}
  minio:
    endpoint: ${MINIO_ENDPOINT:}
    access-key: ${MINIO_ACCESS_KEY:}
    secret-key: ${MINIO_SECRET_KEY:}
    bucket: ${MINIO_BUCKET:lanchat-files}
    region: ${MINIO_REGION:}


# ==================== Devtools (热加载) ====================
spring.devtools:
  restart:
    enabled: true
    additional-paths: src/main/java
    poll-interval: 2s
    quiet-period: 1s
  livereload:
    enabled: true
    port: 35729

logging:
  file:
    name: ${LANCHAT_LOG_FILE:./logs/lan-chat.log}
  charset:
    file: UTF-8
  pattern:
    file: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] [requestId=%X{requestId:-system}] %logger{48} - %msg%n%wEx"
  logback:
    rollingpolicy:
      max-file-size: ${LANCHAT_LOG_MAX_FILE_SIZE:20MB}
      max-history: ${LANCHAT_LOG_MAX_HISTORY:30}
      total-size-cap: ${LANCHAT_LOG_TOTAL_SIZE_CAP:1GB}
      clean-history-on-start: false
  level:
    com.lanchat: info

# WebSocket 浏览器来源。公网经过 HTTPS Tunnel 转发到本机 HTTP 时，
# 必须显式允许公网 Origin，否则 Spring 默认同源校验会拒绝握手。
websocket:
  allowed-origins: ${WEBSOCKET_ALLOWED_ORIGINS:https://chat.atti.cc.cd,http://localhost:8080,http://127.0.0.1:8080,tauri://localhost,http://tauri.localhost,https://tauri.localhost,http://127.0.0.1:1420,http://localhost:1420,https://localhost}

# ==================== Cloudflare Tunnel ====================
tunnel:
  enabled: ${TUNNEL_ENABLED:true}
  hostname: ${TUNNEL_HOSTNAME:}
