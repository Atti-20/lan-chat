name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - "feature/**"
      - "codex/**"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Java 17 / Maven tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run backend tests
        run: ./mvnw -B test

  frontend:
    name: Node 20 / frontend checks
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Run frontend unit tests
        run: npm test --prefix frontend

      - name: Run Vue and TypeScript checks
        run: npm run typecheck --prefix frontend

      - name: Build production frontend
        run: npm run build --prefix frontend

  repository-checks:
    name: Compose and patch hygiene
    runs-on: ubuntu-22.04
    env:
      DB_ROOT_PASSWORD: E2eRootPassword-2026
      DB_PASSWORD: E2eDatabasePassword-2026
      REDIS_PASSWORD: E2eRedisPassword-2026
      JWT_SECRET: e2e-only-jwt-secret-at-least-thirty-two-characters
      LANCHAT_BOOTSTRAP_ADMIN_PASSWORD: E2eAdminPassword-2026
      MINIO_ROOT_USER: e2e-minio-user
      MINIO_ROOT_PASSWORD: E2eMinioPassword-2026
      LANCHAT_PORT: "18080"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate production Compose
        run: docker compose -f compose.yaml config --quiet

      - name: Validate E2E Compose overlay
        run: docker compose -f compose.yaml -f compose.e2e.yaml config --quiet

      - name: Check whitespace errors
        shell: bash
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            git diff --check "origin/${GITHUB_BASE_REF}...HEAD"
          else
            git show --check --format= HEAD
          fi
