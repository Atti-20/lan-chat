name: lanchat-private

x-lanchat-environment: &lanchat-environment
  SPRING_PROFILES_ACTIVE: private
  DB_URL: jdbc:mysql://mysql:3306/lan_chat?serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=utf8&connectionCollation=utf8mb4_general_ci
  DB_USERNAME: lanchat
  DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
  REDIS_HOST: redis
  REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
  JWT_SECRET: ${JWT_SECRET:?Set a random JWT_SECRET in .env}
  LANCHAT_PRIVATE_DEPLOYMENT: "true"
  LANCHAT_SELF_REGISTRATION_ENABLED: "false"
  LANCHAT_BOOTSTRAP_ADMIN_NICKNAME: ${LANCHAT_BOOTSTRAP_ADMIN_NICKNAME:-系统管理员}
  LANCHAT_NODE_ID: ${LANCHAT_NODE_ID:-lanchat-private}
  LANCHAT_NODE_NAME: ${LANCHAT_NODE_NAME:-LanChat Private Node}
  LANCHAT_ORGANIZATION_NAME: ${LANCHAT_ORGANIZATION_NAME:-Private Organization}
  LANCHAT_MODE: ${LANCHAT_MODE:-LAN_FIRST}
  LANCHAT_ADVERTISED_HOST: ${LANCHAT_ADVERTISED_HOST:-}
  LANCHAT_ADVERTISED_PORT: ${LANCHAT_ADVERTISED_PORT:-8080}
  LANCHAT_NODE_SECURE: ${LANCHAT_NODE_SECURE:-false}
  LANCHAT_CLUSTER_ENABLED: ${LANCHAT_CLUSTER_ENABLED:-true}
  LANCHAT_CLUSTER_ID: ${LANCHAT_CLUSTER_ID:-lanchat-private}
  LANCHAT_CLUSTER_CHANNEL: ${LANCHAT_CLUSTER_CHANNEL:-lanchat:lanchat-private:realtime:v1}
  LANCHAT_PRESENCE_TTL_SECONDS: ${LANCHAT_PRESENCE_TTL_SECONDS:-75}
  LANCHAT_PRESENCE_HEARTBEAT_SECONDS: ${LANCHAT_PRESENCE_HEARTBEAT_SECONDS:-20}
  AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
  FILE_STORAGE_TYPE: ${FILE_STORAGE_TYPE:-MINIO}
  FILE_STORAGE_PATH: /app/uploads/
  FILE_STAGING_PATH: /tmp/lanchat-upload-staging
  FILE_UPLOAD_CHUNK_SIZE: ${FILE_UPLOAD_CHUNK_SIZE:-8388608}
  FILE_UPLOAD_TTL_HOURS: ${FILE_UPLOAD_TTL_HOURS:-24}
  FILE_UPLOAD_MAX_CONCURRENCY: ${FILE_UPLOAD_MAX_CONCURRENCY:-3}
  FILE_UPLOAD_CLEANUP_FIXED_DELAY_MS: ${FILE_UPLOAD_CLEANUP_FIXED_DELAY_MS:-600000}
  FILE_UPLOAD_CLEANUP_INITIAL_DELAY_MS: ${FILE_UPLOAD_CLEANUP_INITIAL_DELAY_MS:-60000}
  FILE_OBJECT_CLEANUP_FIXED_DELAY_MS: ${FILE_OBJECT_CLEANUP_FIXED_DELAY_MS:-60000}
  FILE_OBJECT_CLEANUP_INITIAL_DELAY_MS: ${FILE_OBJECT_CLEANUP_INITIAL_DELAY_MS:-60000}
  MINIO_ENDPOINT: http://minio:9000
  MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:?Set MINIO_ROOT_USER in .env}
  MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}
  MINIO_BUCKET: ${MINIO_BUCKET:-lanchat-files}
  LANCHAT_LOG_MAX_FILE_SIZE: ${LANCHAT_LOG_MAX_FILE_SIZE:-20MB}
  LANCHAT_LOG_MAX_HISTORY: ${LANCHAT_LOG_MAX_HISTORY:-30}
  LANCHAT_LOG_TOTAL_SIZE_CAP: ${LANCHAT_LOG_TOTAL_SIZE_CAP:-1GB}
  LANCHAT_RUNTIME_LOG_MAX_READ_BYTES: ${LANCHAT_RUNTIME_LOG_MAX_READ_BYTES:-4194304}
  WEBSOCKET_ALLOWED_ORIGINS: ${WEBSOCKET_ALLOWED_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
  TUNNEL_ENABLED: "false"
  TZ: Asia/Shanghai

x-lanchat-service: &lanchat-service
  build:
    context: .
  restart: unless-stopped
  init: true
  read_only: true
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  tmpfs:
    - /tmp:size=512m,mode=1777
  healthcheck:
    test: ["CMD", "curl", "--fail", "--silent", "--show-error", "http://127.0.0.1:8080/api/v1/node/health"]
    interval: 15s
    timeout: 5s
    retries: 12
    start_period: 35s
  depends_on:
    mysql:
      condition: service_healthy
    redis:
      condition: service_healthy
    minio:
      condition: service_healthy
  networks: [edge, data]

services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?Set DB_ROOT_PASSWORD in .env}
      MYSQL_DATABASE: lan_chat
      MYSQL_USER: lanchat
      MYSQL_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
    volumes:
      - mysql-data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 --user=root --password=\"$$MYSQL_ROOT_PASSWORD\" --silent"]
      interval: 5s
      timeout: 5s
      retries: 30
    networks: [data]

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
    command: ["sh", "-c", "exec redis-server --appendonly yes --requirepass \"$$REDIS_PASSWORD\""]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [data]

  minio:
    image: quay.io/minio/minio:RELEASE.2025-07-23T15-54-02Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?Set MINIO_ROOT_USER in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}
    volumes:
      - minio-data:/data
    ports:
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://127.0.0.1:9000/minio/health/live >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks: [data]

  lanchat:
    <<: *lanchat-service
    environment:
      <<: *lanchat-environment
      LANCHAT_INSTANCE_ID: lanchat-1
      LANCHAT_BOOTSTRAP_ADMIN_PASSWORD: ${LANCHAT_BOOTSTRAP_ADMIN_PASSWORD:?Set LANCHAT_BOOTSTRAP_ADMIN_PASSWORD in .env}
      LANCHAT_DISCOVERY_ENABLED: ${LANCHAT_DISCOVERY_ENABLED:-false}
      LANCHAT_DISCOVERY_INTERFACE_ADDRESS: ${LANCHAT_DISCOVERY_INTERFACE_ADDRESS:-}
      LANCHAT_LOG_FILE: /app/logs/lan-chat-1.log
    volumes:
      - uploads:/app/uploads
      - logs-primary:/app/logs

  lanchat-2:
    <<: *lanchat-service
    environment:
      <<: *lanchat-environment
      LANCHAT_INSTANCE_ID: lanchat-2
      LANCHAT_BOOTSTRAP_ADMIN_PASSWORD: ${LANCHAT_BOOTSTRAP_ADMIN_PASSWORD:?Set LANCHAT_BOOTSTRAP_ADMIN_PASSWORD in .env}
      LANCHAT_DISCOVERY_ENABLED: "false"
      LANCHAT_DISCOVERY_INTERFACE_ADDRESS: ""
      LANCHAT_LOG_FILE: /app/logs/lan-chat-2.log
    volumes:
      - uploads:/app/uploads
      - logs-secondary:/app/logs

  gateway:
    image: nginx:1.29-alpine
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
    ports:
      - "${LANCHAT_PORT:-8080}:8080"
    tmpfs:
      - /var/cache/nginx:size=32m,mode=0755
      - /var/run:size=2m,mode=0755
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/v1/node/health >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 12
    depends_on:
      lanchat:
        condition: service_healthy
      lanchat-2:
        condition: service_healthy
    networks: [edge]

networks:
  edge:
  data:
    internal: true

volumes:
  mysql-data:
  redis-data:
  minio-data:
  uploads:
  logs-primary:
  logs-secondary:
