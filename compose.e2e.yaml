services:
  lanchat:
    ports:
      - "127.0.0.1:18081:8080"
    environment:
      SPRING_PROFILES_ACTIVE: default
      LANCHAT_PRIVATE_DEPLOYMENT: "false"
      LANCHAT_SELF_REGISTRATION_ENABLED: "true"
      LANCHAT_BOOTSTRAP_ADMIN_PASSWORD: ""
      LANCHAT_DISCOVERY_ENABLED: "false"
      LANCHAT_ADVERTISED_HOST: 127.0.0.1
      LANCHAT_ADVERTISED_PORT: "18081"
      AUTH_COOKIE_SECURE: "false"
      CORS_ALLOWED_ORIGINS: http://127.0.0.1:18080,http://localhost:18080,http://127.0.0.1:18081,http://localhost:18081,http://127.0.0.1:18082,http://localhost:18082,tauri://localhost,http://tauri.localhost,https://tauri.localhost
      WEBSOCKET_ALLOWED_ORIGINS: http://127.0.0.1:18080,http://localhost:18080,http://127.0.0.1:18081,http://localhost:18081,http://127.0.0.1:18082,http://localhost:18082,tauri://localhost,http://tauri.localhost

  lanchat-2:
    ports:
      - "127.0.0.1:18082:8080"
    environment:
      SPRING_PROFILES_ACTIVE: default
      LANCHAT_PRIVATE_DEPLOYMENT: "false"
      LANCHAT_SELF_REGISTRATION_ENABLED: "true"
      LANCHAT_BOOTSTRAP_ADMIN_PASSWORD: ""
      LANCHAT_DISCOVERY_ENABLED: "false"
      LANCHAT_ADVERTISED_HOST: 127.0.0.1
      LANCHAT_ADVERTISED_PORT: "18082"
      AUTH_COOKIE_SECURE: "false"
      CORS_ALLOWED_ORIGINS: http://127.0.0.1:18080,http://localhost:18080,http://127.0.0.1:18081,http://localhost:18081,http://127.0.0.1:18082,http://localhost:18082,tauri://localhost,http://tauri.localhost,https://tauri.localhost
      WEBSOCKET_ALLOWED_ORIGINS: http://127.0.0.1:18080,http://localhost:18080,http://127.0.0.1:18081,http://localhost:18081,http://127.0.0.1:18082,http://localhost:18082,tauri://localhost,http://tauri.localhost
